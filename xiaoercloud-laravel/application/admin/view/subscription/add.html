<form id="add-form" class="form-horizontal" role="form" data-toggle="validator" method="POST" action="">

    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('User_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-user_id" data-rule="required" min="0" data-source="user/user/index" data-field="nickname" class="form-control selectpage" name="row[user_id]" type="text" value="">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Plan_id')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-plan_id" data-rule="required" min="0" data-source="plan/index" class="form-control selectpage" name="row[plan_id]" type="text" value="">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Sub_status')}:</label>
        <div class="col-xs-12 col-sm-8">
            
            <div class="radio">
            {foreach name="subStatusList" item="vo"}
            <label for="row[sub_status]-{$key}"><input id="row[sub_status]-{$key}" name="row[sub_status]" type="radio" value="{$key}" {in name="key" value="有效"}checked{/in} /> {$vo}</label> 
            {/foreach}
            </div>

        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Next_billing_date')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-next_billing_date" class="form-control datetimepicker" data-date-format="YYYY-MM-DD" data-use-current="true" name="row[next_billing_date]" type="text" value="{:date('Y-m-d')}">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Used_upload_gb')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-used_upload_gb" data-rule="required" class="form-control" step="0.01" name="row[used_upload_gb]" type="number" value="0.00">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Used_download_gb')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-used_download_gb" data-rule="required" class="form-control" step="0.01" name="row[used_download_gb]" type="number" value="0.00">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Clash_url')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-clash_url" class="form-control" name="row[clash_url]" type="text" value="">
        </div>
    </div>
    <div class="form-group">
        <label class="control-label col-xs-12 col-sm-2">{:__('Shadowrocket_url')}:</label>
        <div class="col-xs-12 col-sm-8">
            <input id="c-shadowrocket_url" class="form-control" name="row[shadowrocket_url]" type="text" value="">
        </div>
    </div>
    <div class="form-group layer-footer">
        <label class="control-label col-xs-12 col-sm-2"></label>
        <div class="col-xs-12 col-sm-8">
            <button type="submit" class="btn btn-primary btn-embossed disabled">{:__('OK')}</button>
        </div>
    </div>
</form>
