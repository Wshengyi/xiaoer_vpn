<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>用户中心 - 小二Cloud</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f7fb}.wrap{max-width:980px;margin:25px auto}.card{background:#fff;border:1px solid #e8ecf3;border-radius:10px;padding:18px;margin-bottom:14px}.stat{font-size:28px;font-weight:700}</style>
</head><body>
<div class="wrap container-fluid">
    <div class="card">
        <div class="clearfix">
            <h3 class="pull-left" style="margin:0">用户中心</h3>
            <div class="pull-right">
                <a class="btn btn-default btn-sm" href="{:url('index/cloud/subscription')}">订阅链接</a>
                <a class="btn btn-default btn-sm" href="{:url('index/cloud/index')}">返回首页</a>
            </div>
        </div>
    </div>

    {if !$sub}
    <div class="card">
        <p>你还没有订阅，先去购买套餐吧。</p>
        <a class="btn btn-primary" href="{:url('index/cloud/index')}">去选购</a>
    </div>
    {else /}
    <div class="row">
        <div class="col-sm-6"><div class="card"><div>订阅状态</div><div class="stat">{$sub.sub_status}</div></div></div>
        <div class="col-sm-6"><div class="card"><div>下次扣费</div><div class="stat" style="font-size:22px">{$sub.next_billing_date}</div></div></div>
    </div>
    <div class="card">
        <p>套餐：<b>{$sub.plan_name}</b>（¥{$sub.price}/{$sub.cycle}）</p>
        <p>流量：剩余 <b>{$sub.remaining|default='0'}GB</b> / 总量 {$sub.traffic_gb}GB，已用 {$sub.used|default='0'}GB</p>
    </div>
    {/if}
</div>
</body></html>
