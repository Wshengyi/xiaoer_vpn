<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>小二Cloud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body{background:#f5f7fb}.wrap{max-width:1080px;margin:30px auto}.card{background:#fff;border:1px solid #e8ecf3;border-radius:10px;padding:18px;margin-bottom:16px}.hero{padding:30px}.muted{color:#7d8795}</style>
</head>
<body>
<div class="wrap container-fluid">
    <div class="card hero text-center">
        <h1>小二Cloud</h1>
        <p class="muted">MVP · Clash / Shadowrocket 订阅交付</p>
        {if $isLogin}
        <a class="btn btn-primary" href="{:url('index/cloud/dashboard')}">进入用户中心</a>
        {else /}
        <a class="btn btn-primary" href="{:url('index/user/login')}?url={:urlencode(url('index/cloud/dashboard', '', false, true))}">登录</a>
        <a class="btn btn-default" href="{:url('index/user/register')}">注册</a>
        {/if}
    </div>

    <div class="row">
        {volist name="plans" id="p"}
        <div class="col-sm-6">
            <div class="card">
                <h3>{$p.name}</h3>
                <p>价格：<b>¥{$p.price}/{$p.cycle}</b></p>
                <p>流量：<b>{$p.traffic_gb}GB</b></p>
                {if $isLogin}
                <a class="btn btn-success" href="{:url('index/cloud/checkout',['id'=>$p.id])}">立即下单</a>
                {else /}
                <a class="btn btn-success" href="{:url('index/user/login')}?url={:urlencode(url('index/cloud/checkout',['id'=>$p.id],false,true))}">登录后购买</a>
                {/if}
            </div>
        </div>
        {/volist}
    </div>
</div>
</body>
</html>
