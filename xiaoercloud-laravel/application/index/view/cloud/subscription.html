<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>订阅链接 - 小二Cloud</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f7fb}.wrap{max-width:980px;margin:25px auto}.card{background:#fff;border:1px solid #e8ecf3;border-radius:10px;padding:18px;margin-bottom:14px}.code{display:block;word-break:break-all;background:#f7f9fc;border:1px dashed #c9d3e5;padding:10px;border-radius:8px}</style>
</head><body>
<div class="wrap container-fluid">
    <div class="card clearfix">
        <h3 class="pull-left" style="margin:0">订阅链接中心</h3>
        <a class="btn btn-default btn-sm pull-right" href="{:url('index/cloud/dashboard')}">返回用户中心</a>
    </div>

    {if !$sub}
    <div class="card">暂无订阅数据。</div>
    {else /}
    <div class="card">
        <p>套餐：<b>{$sub.plan_name}</b>（¥{$sub.price}/{$sub.cycle}）</p>
        <p>Clash</p>
        <code class="code">{$sub.clash_url}</code>
        <p>Shadowrocket</p>
        <code class="code">{$sub.shadowrocket_url}</code>
    </div>
    {/if}
</div>
</body></html>
