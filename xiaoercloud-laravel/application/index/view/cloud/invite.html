<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>邀请管理 - 小二Cloud</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f7fb}.wrap{max-width:980px;margin:25px auto}.card{background:#fff;border:1px solid #e8ecf3;border-radius:10px;padding:18px;margin-bottom:14px}</style>
</head><body>
<div class="wrap container-fluid">
    <div class="card clearfix">
        <h3 class="pull-left" style="margin:0">邀请管理</h3>
        <a class="btn btn-default btn-sm pull-right" href="{:url('index/cloud/dashboard')}">返回用户中心</a>
    </div>

    <div class="card">
        <form method="post" action="">
            <button class="btn btn-primary" type="submit">生成邀请码（30天有效）</button>
        </form>
    </div>

    <div class="card">
        <table class="table table-bordered table-striped">
            <thead><tr><th>ID</th><th>邀请码</th><th>状态</th><th>过期时间</th><th>使用时间</th></tr></thead>
            <tbody>
            {volist name='list' id='r'}
                <tr>
                    <td>{$r.id}</td>
                    <td><code>{$r.code}</code></td>
                    <td>{$r.status}</td>
                    <td>{if $r.expire_time}{:date('Y-m-d H:i',$r.expire_time)}{/if}</td>
                    <td>{if $r.used_time}{:date('Y-m-d H:i',$r.used_time)}{/if}</td>
                </tr>
            {/volist}
            </tbody>
        </table>
    </div>
</div>
</body></html>
