<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>订单详情 - 小二Cloud</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f5f7fb}.wrap{max-width:860px;margin:25px auto}.card{background:#fff;border:1px solid #e8ecf3;border-radius:10px;padding:18px}</style>
</head><body>
<div class="wrap container-fluid">
    <div class="card">
        <h3>订单详情</h3>
        <p>订单号：<b>{$order.order_no}</b></p>
        <p>套餐：<b>{$order.plan_name}</b></p>
        <p>金额：<b>¥{$order.amount}</b></p>
        <p>状态：<b>{$order.pay_status}</b></p>

        {if $order.pay_status != '已支付'}
        <a class="btn btn-success" href="{:url('index/cloud/pay',['id'=>$order.id])}">模拟支付成功</a>
        {/if}
        <a class="btn btn-default" href="{:url('index/cloud/dashboard')}">返回用户中心</a>
    </div>
</div>
</body></html>
