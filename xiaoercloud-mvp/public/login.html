<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>登录 - 小二Cloud</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container" style="max-width:560px">
    <div class="nav"><div class="logo">小二Cloud</div><a class="badge" href="/">返回首页</a></div>
    <div class="card">
      <h2>用户登录</h2>
      <p class="notice">演示账号：demo@xiaoercloud.local / 123456</p>
      <label class="label">邮箱</label>
      <input id="email" class="input" value="demo@xiaoercloud.local" />
      <label class="label">密码</label>
      <input id="password" class="input" type="password" value="123456" />
      <div class="actions" style="margin-top:8px">
        <button id="login" class="btn">登录</button>
      </div>
      <p id="msg" class="notice"></p>
    </div>
  </div>
  <script>
    document.getElementById('login').onclick=async()=>{
      const email=document.getElementById('email').value;
      const password=document.getElementById('password').value;
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await r.json();
      if(!r.ok){document.getElementById('msg').textContent=data.error||'登录失败';return;}
      localStorage.setItem('xiaoer_user',JSON.stringify(data));
      location.href='/dashboard.html';
    }
  </script>
</body>
</html>
